<!DOCTYPE html>
<html>
<head>
  <title>Preferences</title>
</head>
<body>
  <h1>Preferences page werkt ✅</h1>

  <p id="email"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    document.getElementById("email").innerText = "Email: " + email;
  </script>
</body>
</html>
