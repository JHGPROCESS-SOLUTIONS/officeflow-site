<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>OfficeFlow — Stel je schrijfstijl in</title>

<style>
:root {
  --bg-main: #FFFFFF;
  --bg-subtle: #F8FAFC;
  --text-primary: #0F172A;
  --text-secondary: #64748B;

  --primary-orange: #F97316;
  --primary-orange-hover: #EA580C;
  --light-accent: #FED7AA;
  --gradient: linear-gradient(135deg, #F97316, #FB923C);

  --border: #E2E8F0;
  --success: #22C55E;
  --error: #EF4444;
}

body {
  margin: 0;
  font-family: Inter, Arial;
  background: var(--bg-subtle);
  color: var(--text-primary);
}

.container {
  max-width: 900px;
  margin: 50px auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  width: 180px;
}

h1 {
  margin-bottom: 8px;
}

.sub {
  color: var(--text-secondary);
  margin-bottom: 25px;
}

.section {
  margin-top: 30px;
}

.section h2 {
  margin-bottom: 10px;
}

.helper-box {
  background: #FFF7ED;
  border: 1px solid #FED7AA;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  color: #9A3412;
  margin-top: 10px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.field {
  display: flex;
  flex-direction: column;
}

.full {
  grid-column: 1 / -1;
}

label {
  font-weight: 600;
  margin-bottom: 6px;
}

small {
  color: var(--text-secondary);
  font-size: 12px;
  margin-top: 6px;
}

select, textarea, input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

textarea {
  min-height: 100px;
}

.checkbox {
  margin-top: 10px;
}

.button {
  margin-top: 30px;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: var(--gradient);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.button:hover {
  background: var(--primary-orange-hover);
}

.status {
  margin-top: 15px;
  font-weight: 600;
}

.success { color: var(--success); }
.error { color: var(--error); }

</style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="/OfficeFlow-logo.png" />
</div>

<div class="card">

<h1>Stel je schrijfstijl in</h1>
<p class="sub">OfficeFlow schrijft straks precies zoals jij dat wilt.</p>

<p id="emailText"></p>

<form id="form">

<div class="section">
<h2>Algemene stijl</h2>

<div class="grid">

<div class="field">
<label>Taal</label>
<select id="preferred_language">
<option value="nl">Nederlands</option>
<option value="en">English</option>
</select>
</div>

<div class="field">
<label>Toon</label>
<select id="tone_preference">
<option value="direct">Direct</option>
<option value="friendly">Friendly</option>
<option value="formal">Formal</option>
</select>
</div>

<div class="field">
<label>Formaliteit</label>
<select id="formality">
<option value="neutral">Neutraal</option>
<option value="informal">Informeel</option>
<option value="formal">Formeel</option>
</select>
</div>

<div class="field">
<label>Lengte</label>
<select id="length_preference">
<option value="short">Kort</option>
<option value="medium">Gemiddeld</option>
</select>
</div>

</div>
</div>

<div class="section">
<h2>Persoonlijke stijl</h2>

<div class="grid">

<div class="field full">
<label>Voorkeurszinnen</label>
<textarea id="preferred_phrases" placeholder="Elke regel = 1 voorkeur

Bijvoorbeeld:
Hou het praktisch en duidelijk.
Ik kom hier vandaag nog op terug.
Goed punt, dank daarvoor."></textarea>
</div>

<div class="field full">
<label>Zinnen vermijden</label>
<textarea id="forbidden_phrases" placeholder="Elke regel = vermijden

Bijvoorbeeld:
Dank voor je bericht.
Neem gerust contact op.
Mocht je nog vragen hebben."></textarea>
</div>

<div class="field full">
<label>Extra instructies</label>
<textarea id="custom_instructions" placeholder="Bijvoorbeeld:

Onze openingstijden zijn 09:00–17:00.
Antwoord altijd binnen 1 werkdag.
Verwijs naar onze website bij prijsvragen.
Houd het kort en praktisch."></textarea>

<div class="helper-box">
💡 Tip: hoe concreter je bent, hoe beter je AI replies worden.
</div>
</div>

<div class="field full">
<label>E-mail handtekening</label>
<textarea id="signature_text" placeholder="Bijvoorbeeld:

Met vriendelijke groet,
Jesse Hendriks
OfficeFlow

www.officeflowcompany.com"></textarea>
</div>

</div>
</div>

<div class="section">
<h2>Extra instellingen</h2>

<label class="checkbox">
<input type="checkbox" id="emoji_preference"> Emoji toestaan
</label>

<label class="checkbox">
<input type="checkbox" id="style_learning_enabled"> Style learning
</label>

<label class="checkbox">
<input type="checkbox" id="auto_draft_enabled"> Automatisch drafts maken
</label>

</div>

<button class="button">Voorkeuren opslaan</button>

<p id="status" class="status"></p>

</form>

</div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const email = params.get("email");

document.getElementById("emailText").innerText =
email ? "Gekoppeld: " + email : "Geen email gevonden";

document.getElementById("form").addEventListener("submit", async (e) => {
e.preventDefault();

const payload = {
email,
preferred_language: document.getElementById("preferred_language").value,
tone_preference: document.getElementById("tone_preference").value,
formality: document.getElementById("formality").value,
length_preference: document.getElementById("length_preference").value,
emoji_preference: document.getElementById("emoji_preference").checked,
style_learning_enabled: document.getElementById("style_learning_enabled").checked,
auto_draft_enabled: document.getElementById("auto_draft_enabled").checked,
preferred_phrases: document.getElementById("preferred_phrases").value,
forbidden_phrases: document.getElementById("forbidden_phrases").value,
custom_instructions: document.getElementById("custom_instructions").value,
signature_text: document.getElementById("signature_text").value
};

document.getElementById("status").innerText = "Opslaan...";

try {
const res = await fetch("https://ai-mail-assistant-production-979f.up.railway.app/settings/prompt", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(payload)
});

if (!res.ok) {
document.getElementById("status").innerText = "❌ Opslaan mislukt";
document.getElementById("status").className = "status error";
return;
}

document.getElementById("status").innerText = "✅ Opgeslagen!";
document.getElementById("status").className = "status success";

} catch {
document.getElementById("status").innerText = "❌ Error";
document.getElementById("status").className = "status error";
}
});

</script>

</body>
</html>
