<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfficeFlow Preferences</title>
</head>
<body style="font-family: Arial; padding: 40px;">
  <h1>Stel je reply-voorkeuren in</h1>
  <p id="emailText"></p>

  <form id="preferencesForm" style="max-width: 500px;">
    <label>Taal</label>
    <br />
    <select id="preferred_language" style="padding: 10px; width: 100%; margin-top: 6px; margin-bottom: 16px;">
      <option value="nl">Nederlands</option>
      <option value="en">English</option>
    </select>

    <label>Toon</label>
    <br />
    <select id="tone_preference" style="padding: 10px; width: 100%; margin-top: 6px; margin-bottom: 16px;">
      <option value="direct">Direct</option>
      <option value="friendly">Friendly</option>
      <option value="formal">Formal</option>
    </select>

    <label>Formaliteit</label>
    <br />
    <select id="formality" style="padding: 10px; width: 100%; margin-top: 6px; margin-bottom: 16px;">
      <option value="neutral">Neutraal</option>
      <option value="informal">Informeel</option>
      <option value="formal">Formeel</option>
    </select>

    <label>Lengte</label>
    <br />
    <select id="length_preference" style="padding: 10px; width: 100%; margin-top: 6px; margin-bottom: 16px;">
      <option value="short">Kort</option>
      <option value="medium">Gemiddeld</option>
    </select>

    <label style="display:block; margin-bottom: 16px;">
      <input type="checkbox" id="emoji_preference" />
      Emoji toestaan
    </label>

    <button id="saveBtn" type="submit" style="padding: 14px 24px;">Voorkeuren opslaan</button>
  </form>

  <p id="status" style="margin-top: 20px; white-space: pre-wrap;"></p>

  <script>
    const API_BASE = "https://ai-mail-assistant-production-979f.up.railway.app";
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    const emailText = document.getElementById("emailText");
    const statusEl = document.getElementById("status");
    const formEl = document.getElementById("preferencesForm");
    const saveBtn = document.getElementById("saveBtn");

    emailText.innerText = email
      ? "Gekoppeld e-mailadres: " + email
      : "Geen e-mailadres gevonden";

    function setStatus(message, isError = false) {
      statusEl.innerText = message;
      statusEl.style.color = isError ? "#b00020" : "#111";
    }

    async function parseResponse(response) {
      const text = await response.text();

      try {
        return text ? JSON.parse(text) : {};
      } catch {
        return { raw: text };
      }
    }

    formEl.addEventListener("submit", async function (e) {
      e.preventDefault();

      if (!email) {
        setStatus("Geen e-mailadres gevonden in URL.", true);
        return;
      }

      const payload = {
        email: email,
        preferred_language: document.getElementById("preferred_language").value,
        tone_preference: document.getElementById("tone_preference").value,
        formality: document.getElementById("formality").value,
        length_preference: document.getElementById("length_preference").value,
        emoji_preference: document.getElementById("emoji_preference").checked
      };

      saveBtn.disabled = true;
      setStatus("Opslaan...");

      try {
        const response = await fetch(`${API_BASE}/settings/prompt`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await parseResponse(response);

        if (!response.ok) {
          const detail =
            data?.detail ||
            data?.error ||
            data?.message ||
            JSON.stringify(data);

          setStatus("Opslaan mislukt: " + detail, true);
          console.log("Save settings error:", data);
          return;
        }

        setStatus("Voorkeuren opgeslagen.");
        console.log("Save settings success:", data);
      } catch (error) {
        setStatus("Er ging iets mis: " + error.message, true);
        console.log("Network/client error:", error);
      } finally {
        saveBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
