<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OfficeFlow – Voorkeuren</title>

  <style>
    :root {
      --bg: #FFFFFF;
      --bg-soft: #F8FAFC;
      --text: #0F172A;
      --text-muted: #64748B;

      --orange: #F97316;
      --orange-dark: #EA580C;
      --orange-light: #FED7AA;

      --border: #E2E8F0;

      --gradient: linear-gradient(135deg, #F97316, #FB923C);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-soft);
      color: var(--text);
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo img {
      width: 180px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p.sub {
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    .email-box {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
    }

    select, textarea, input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-top: 5px;
    }

    textarea {
      min-height: 100px;
    }

    .checkbox {
      margin-top: 10px;
    }

    .btn {
      background: var(--gradient);
      border: none;
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .status {
      margin-top: 20px;
      font-weight: bold;
    }

    @media(max-width: 700px){
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    <!-- Zet jouw logo bestand in dezelfde folder -->
    <img src="/officeflow-logo.png" alt="OfficeFlow logo">
  </div>

  <div class="card">

    <h1>Stel je reply-voorkeuren in</h1>
    <p class="sub">Laat OfficeFlow schrijven zoals jij dat wilt.</p>

    <div class="email-box" id="emailText"></div>

    <form id="form">

      <div class="section">
        <h2>Algemene stijl</h2>

        <div class="grid">
          <div>
            <label>Taal</label>
            <select id="preferred_language">
              <option value="nl">Nederlands</option>
              <option value="en">English</option>
            </select>
          </div>

          <div>
            <label>Toon</label>
            <select id="tone_preference">
              <option value="direct">Direct</option>
              <option value="friendly">Friendly</option>
              <option value="formal">Formal</option>
            </select>
          </div>

          <div>
            <label>Formaliteit</label>
            <select id="formality">
              <option value="neutral">Neutraal</option>
              <option value="informal">Informeel</option>
              <option value="formal">Formeel</option>
            </select>
          </div>

          <div>
            <label>Lengte</label>
            <select id="length_preference">
              <option value="short">Kort</option>
              <option value="medium">Gemiddeld</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Persoonlijke stijl</h2>

        <label>Voorkeurszinnen</label>
        <textarea id="preferred_phrases"></textarea>

        <label style="margin-top:15px;">Zinnen vermijden</label>
        <textarea id="forbidden_phrases"></textarea>

        <label style="margin-top:15px;">Extra instructies</label>
        <textarea id="custom_instructions"></textarea>
      </div>

      <div class="section">
        <h2>Extra instellingen</h2>

        <label class="checkbox">
          <input type="checkbox" id="emoji_preference"> Emoji toestaan
        </label>

        <label class="checkbox">
          <input type="checkbox" id="style_learning_enabled"> Style learning
        </label>
      </div>

      <button class="btn" type="submit">Voorkeuren opslaan</button>

      <div id="status" class="status"></div>

    </form>

  </div>
</div>

<script>
const API = "https://ai-mail-assistant-production-979f.up.railway.app";

const params = new URLSearchParams(window.location.search);
const email = params.get("email");

document.getElementById("emailText").innerText =
  email ? "Gekoppeld e-mailadres: " + email : "Geen email gevonden";

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    email,
    preferred_language: document.getElementById("preferred_language").value,
    tone_preference: document.getElementById("tone_preference").value,
    formality: document.getElementById("formality").value,
    length_preference: document.getElementById("length_preference").value,
    emoji_preference: document.getElementById("emoji_preference").checked,
    style_learning_enabled: document.getElementById("style_learning_enabled").checked,
    preferred_phrases: document.getElementById("preferred_phrases").value,
    forbidden_phrases: document.getElementById("forbidden_phrases").value,
    custom_instructions: document.getElementById("custom_instructions").value
  };

  document.getElementById("status").innerText = "Opslaan...";

  const res = await fetch(API + "/settings/prompt", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  if(res.ok){
    document.getElementById("status").innerText = "✅ Opgeslagen!";
  } else {
    document.getElementById("status").innerText = "❌ Fout bij opslaan";
  }
});
</script>

</body>
</html>
